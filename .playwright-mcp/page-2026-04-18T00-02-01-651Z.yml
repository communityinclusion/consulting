    - generic [ref=e54]:
      - blockquote [ref=e55]:
        - paragraph [ref=e56]: "\"ICI Consulting assisted my leadership team at a time when we really needed to develop a common vision and purpose. Senior Policy Fellow Russ Thelin's facilitation of the conversation and planning was key in establishing that vision, identifying values, and bringing my team closer together. The resulting impact on my agency has been very positive and I would recommend ICI Consulting services to other agencies facing similar challenges.\""
        - img "Rob Hines" [ref=e57]
        - paragraph [ref=e58]:
          - text: "-Rob Hines, Director"
          - text: Washington Division of Vocational Rehabilitation
      - paragraph [ref=e59]
    - generic [ref=e60]:
      - generic [ref=e61]:
        - img [ref=e62]
        - heading "Our Approach" [level=1] [ref=e63]
        - paragraph [ref=e64]: Our resources are tailored to ensure you fulfill your organization's particular vision of meeting its mission. We're here to help you grow, thrive, and measure your progress.
        - paragraph [ref=e65]:
          - strong [ref=e66]: "Our consultation services help you:"
        - paragraph [ref=e67]:
          - strong [ref=e68]: Challenge
          - text: the status quo. Together, we'll look critically at your organizational vision, mission, policy, and practice; determine what's hindering your progress; and figure out what needs to change to achieve the culture you envision.
        - paragraph [ref=e69]:
          - strong [ref=e70]: Innovate
          - text: a plan for desired outcomes. With our expert insights, establish how you want things to look and be, and identify clear objectives and next steps.
        - paragraph [ref=e71]:
          - strong [ref=e72]: Empower
          - text: you to carry out the plan, using participatory leadership to guide the change process, delegate to others, and allow for innovation and problem solving at all levels.
        - paragraph [ref=e73]:
          - strong [ref=e74]: Encourage
          - text: full engagement, involving all staff members in staying the course and keeping the plan a priority. This includes building communication feedback loops, reinforcing efforts, and celebrating successes.
        - paragraph [ref=e75]:
          - strong [ref=e76]: Assess
          - text: results by tracking outcomes, using both quantitative and qualitative methods, and using the insights gained to inform continuous improvement, identify your next challenge, and move on to even higher achievements.
